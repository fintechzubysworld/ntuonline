<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTU Online Community</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #f4f7fb;
      color: #1e2b3c;
    }
    /* Top marquee */
    #topMarquee {
      background: #0b3b3a;
      color: #e0f2ee;
      padding: 10px 0;
      font-size: 1.2rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      box-shadow: 0 4px 12px rgba(0,80,70,0.3);
    }
    #topMarquee span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee-top linear infinite;
    }
    /* Bottom message bar (fixed) */
    #bottomMessage {
      background: #0f2d27;
      color: #c0f2e6;
      padding: 8px 0;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      border-top: 1px solid #267369;
    }
    #bottomMessage span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee-bottom linear infinite;
    }
    @keyframes marquee-top {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    @keyframes marquee-bottom {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    /* Main content */
    .container {
      max-width: 1200px;
      margin: 80px auto 60px;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    h1 { color: #0b3b3a; margin-bottom: 20px; }
    .admin-link {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #1f8f7c;
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 500;
      z-index: 1100;
    }
  </style>
</head>
<body>

  <a href="index.html" class="admin-link">Admin</a>

  <!-- Top Marquee (animated) -->
  <div id="topMarquee">
    <span id="topMarqueeText">⚡ Welcome to NTU Online – Stay connected with your community! ⚡</span>
  </div>

  <!-- Bottom Message (animated) -->
  <div id="bottomMessage">
    <span id="bottomMessageText">⚡ Loading message...</span>
  </div>

  <div class="container">
    <div class="card">
      <h1>Community Feed</h1>
      <p>This is a placeholder for the main feed. Real content would be loaded from Firestore.</p>
    </div>
  </div>

  <script>
    (function() {
      // Firebase config (same as admin)
      const firebaseConfig = {
        apiKey: "AIzaSyDA02mVmQxC_cu2QCyq4NN8LhQIWo50V5A",
        authDomain: "ntudioka-online-c29d8.firebaseapp.com",
        projectId: "ntudioka-online-c29d8",
        storageBucket: "ntudioka-online-c29d8.firebasestorage.app",
        messagingSenderId: "1015621578149",
        appId: "1:1015621578149:web:c755b458e505fd32928c4c",
        measurementId: "G-JPVKYQRKEB"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const configDoc = db.collection("config").doc("site");
      const topMarqueeSpan = document.getElementById('topMarqueeText');
      const bottomMarqueeSpan = document.getElementById('bottomMessageText');
      const topMarquee = document.getElementById('topMarquee').querySelector('span');
      const bottomMarquee = document.getElementById('bottomMessage').querySelector('span');

      // Default texts (can be overridden from Firestore)
      let topText = "⚡ Welcome to NTU Online – Stay connected with your community! ⚡";
      let bottomText = "⚡ Loading message...";
      let topSpeed = 40;   // default seconds
      let bottomSpeed = 40;

      // Load configuration
      configDoc.get().then(doc => {
        if (doc.exists) {
          const data = doc.data();
          // Top speed
          if (data.topMarqueeSpeed) {
            topSpeed = parseInt(data.topMarqueeSpeed, 10) || 40;
          }
          // Bottom speed
          if (data.bottomMarqueeSpeed) {
            bottomSpeed = parseInt(data.bottomMarqueeSpeed, 10) || 40;
          }
          // Bottom message (if any)
          if (data.bottomMessage) {
            bottomText = "⚡ " + data.bottomMessage;
          }
          // You could also store a top message in Firestore if desired
        }
        // Apply speeds and texts
        topMarqueeSpan.textContent = topText;
        bottomMarqueeSpan.textContent = bottomText;
        topMarquee.style.animationDuration = topSpeed + 's';
        bottomMarquee.style.animationDuration = bottomSpeed + 's';
      }).catch(err => {
        console.error('Error loading config:', err);
        // Fallback to defaults
        topMarqueeSpan.textContent = topText;
        bottomMarqueeSpan.textContent = bottomText;
        topMarquee.style.animationDuration = topSpeed + 's';
        bottomMarquee.style.animationDuration = bottomSpeed + 's';
      });

      // Optionally listen for realtime updates (if you want instant changes without refresh)
      configDoc.onSnapshot(doc => {
        if (doc.exists) {
          const data = doc.data();
          if (data.topMarqueeSpeed) {
            topSpeed = parseInt(data.topMarqueeSpeed, 10) || 40;
            topMarquee.style.animationDuration = topSpeed + 's';
          }
          if (data.bottomMarqueeSpeed) {
            bottomSpeed = parseInt(data.bottomMarqueeSpeed, 10) || 40;
            bottomMarquee.style.animationDuration = bottomSpeed + 's';
          }
          if (data.bottomMessage) {
            bottomText = "⚡ " + data.bottomMessage;
            bottomMarqueeSpan.textContent = bottomText;
          }
        }
      }, err => console.error('Snapshot error:', err));
    })();
  </script>

</body>
</html>
